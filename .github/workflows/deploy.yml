name: Deploy naar MonsterASP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Stap 1: app_offline.htm uploaden → ASP.NET stopt de app en geeft DLL-locks vrij
      - name: App offline zetten
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "<h1>Even geduld, de site wordt bijgewerkt...</h1>" > /tmp/app_offline.htm
          curl --silent --show-error --ftp-create-dirs \
               --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
               -T /tmp/app_offline.htm \
               "ftp://${FTP_SERVER}/wwwroot/app_offline.htm"
          sleep 5

      # Stap 2: alle bestanden uploaden (DLL's zijn nu vrij)
      - name: Bestanden deployen via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          server-dir: /wwwroot/
          exclude: |
            **/.git*
            **/.git*/**
          dangerous-clean-slate: false

      # Stap 3: app_offline.htm verwijderen → site komt terug online
      # if: always() → ook uitvoeren als stap 2 faalt (site nooit permanent offline)
      - name: App weer online zetten
        if: always()
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import ftplib, os, sys

          server   = os.environ["FTP_SERVER"]
          username = os.environ["FTP_USERNAME"]
          password = os.environ["FTP_PASSWORD"]

          try:
              ftp = ftplib.FTP()
              ftp.connect(server)
              ftp.login(username, password)

              # Probeer meerdere paden (FTP-root verschilt per server)
              for pad in ["wwwroot/app_offline.htm",
                          "/wwwroot/app_offline.htm",
                          "app_offline.htm"]:
                  try:
                      ftp.delete(pad)
                      print(f"✅ app_offline.htm verwijderd via pad: {pad}")
                      break
                  except ftplib.error_perm:
                      pass

              ftp.quit()

          except Exception as e:
              print(f"⚠️  Kon app_offline.htm niet verwijderen: {e}", file=sys.stderr)
              sys.exit(1)
          EOF
